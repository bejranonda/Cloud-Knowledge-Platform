services:
  couchdb:
    image: couchdb:3.3
    container_name: ckp-couchdb
    restart: unless-stopped
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-admin}
    ports:
      - "127.0.0.1:5984:5984"
    volumes:
      - ./data/couchdb:/opt/couchdb/data
      - ./data/couchdb-config:/opt/couchdb/etc/local.d
